<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <g id="ostensorio">
    <!-- Fundo verde -->
    <circle fill="#98E1A0" cx="48" cy="48" r="48"/>

    <!-- Raios longos -->
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="48" y1="34" x2="48" y2="18"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="20" y1="48" x2="36" y2="48"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="60" y1="48" x2="76" y2="48"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="28.7" y1="28.7" x2="38.5" y2="38.5"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="67.3" y1="28.7" x2="57.5" y2="38.5"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="67.3" y1="67.3" x2="57.5" y2="57.5"/>
    <line stroke="#F5C842" stroke-width="3" stroke-linecap="round" x1="28.7" y1="67.3" x2="38.5" y2="57.5"/>

    <!-- Raios curtos intermediários -->
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="37.3" y1="20.9" x2="41.3" y2="29.5"/>
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="58.7" y1="20.9" x2="54.7" y2="29.5"/>
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="75.1" y1="37.3" x2="66.5" y2="41.3"/>
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="75.1" y1="58.7" x2="66.5" y2="54.7"/>
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="20.9" y1="37.3" x2="29.5" y2="41.3"/>
    <line stroke="#F5C842" stroke-width="2" stroke-linecap="round" x1="20.9" y1="58.7" x2="29.5" y2="54.7"/>

    <!-- Anel dourado -->
    <circle fill="#F5C842" cx="48" cy="48" r="14"/>
    <!-- Hóstia branca -->
    <circle fill="#FFFFFF" cx="48" cy="48" r="11"/>
    <!-- Cruz na hóstia -->
    <rect fill="#F5C842" x="46.5" y="40" width="3" height="16"/>
    <rect fill="#F5C842" x="40" y="46.5" width="16" height="3"/>

    <!-- Haste -->
    <rect fill="#F5C842" x="45" y="62" width="6" height="14"/>
    <!-- Nódulo -->
    <ellipse fill="#F5C842" cx="48" cy="62" rx="7" ry="3.5"/>
    <!-- Base -->
    <path fill="#F5C842" d="M37,76 Q37,74 48,74 Q59,74 59,76 L62,82 Q62,85 48,85 Q34,85 34,82 Z"/>

    <!-- CONTORNOS #3A3D3E -->

    <!-- Contorno anel -->
    <circle fill="none" stroke="#3A3D3E" stroke-width="1.8" cx="48" cy="48" r="14"/>
    <!-- Contorno hóstia -->
    <circle fill="none" stroke="#3A3D3E" stroke-width="1.8" cx="48" cy="48" r="11"/>

    <!-- Contorno cruz -->
    <rect fill="none" stroke="#3A3D3E" stroke-width="1" x="46.5" y="40" width="3" height="16"/>
    <rect fill="none" stroke="#3A3D3E" stroke-width="1" x="40" y="46.5" width="16" height="3"/>

    <!-- Contorno haste -->
    <rect fill="none" stroke="#3A3D3E" stroke-width="1.5" x="45" y="62" width="6" height="14" rx="1"/>

    <!-- Contorno nódulo -->
    <ellipse fill="none" stroke="#3A3D3E" stroke-width="1.5" cx="48" cy="62" rx="7" ry="3.5"/>

    <!-- Contorno base -->
    <path fill="none" stroke="#3A3D3E" stroke-width="1.5"
      d="M37,76 Q37,74 48,74 Q59,74 59,76 L62,82 Q62,85 48,85 Q34,85 34,82 Z"/>
  </g>
