app = 'mae-rainha'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  BRIDGETOWN_ENV = "production"
  BRIDGETOWN_PORT = "8080"
  RUBY_YJIT_ENABLE = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '512mb'

[[statics]]
  guest_path = '/app/output'
  url_prefix = '/'