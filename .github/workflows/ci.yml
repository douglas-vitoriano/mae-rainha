name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run esbuild

      - name: Build Bridgetown site
        run: bundle exec bridgetown build
        env:
          BRIDGETOWN_ENV: production

      - name: Verify PWA files exist
        run: |
          missing=0
          for f in output/sw.js output/manifest.json output/offline.html output/index.html output/404.html; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ AUSENTE: $f"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || { echo "::error::Arquivos PWA ausentes no output!"; exit 1; }