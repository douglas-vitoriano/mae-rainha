# .github/workflows/scheduled-deploy.yml

name: Deploy to Cloudflare Pages

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.8'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências frontend
        run: npm install

      - name: Build frontend
        run: bundle exec bridgetown frontend:build

      - name: Instalar dependências
        run: bundle install

      - name: Build do site Bridgetown
        run: bundle exec bridgetown build

      - name: Deploy para Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.74.0'
          command: pages deploy output --project-name=mae-rainha
